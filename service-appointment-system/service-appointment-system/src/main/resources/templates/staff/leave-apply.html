<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Apply Leave — Staff</title>
<link rel="stylesheet" th:href="@{/css/styles.css}"/></head>
<body>
<div class="app-layout">
  <div th:replace="~{fragments/staff-sidebar :: staffSidebar('leave')}"></div>
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left"><h4><i data-lucide="umbrella" class="icon-sm"></i> Leave Requests</h4><p>Apply for time off and track your requests</p></div>
    </div>
    <div class="page-body staff-leave-page">
      <div th:if="${success}" class="alert alert-success"><i data-lucide="check-circle" class="icon-sm"></i> <span th:text="${success}"></span></div>
      <div th:if="${error}"   class="alert alert-danger"><i data-lucide="ban" class="icon-sm"></i> <span th:text="${error}"></span></div>

      <div class="grid-2 staff-leave-grid">
        <!-- Apply Form -->
        <div>
          <div class="form-section">
            <div class="form-section-title"><i data-lucide="umbrella" class="icon-sm"></i> Apply for Leave</div>
            <form class="staff-leave-form" th:action="@{/staff/leave-apply}" method="post">
              <div class="staff-leave-date-grid">
                <div class="form-group">
                  <label class="form-label">Start Date</label>
                  <input type="date" name="startDate" class="form-control no-icon" required/>
                </div>
                <div class="form-group">
                  <label class="form-label">End Date</label>
                  <input type="date" name="endDate" class="form-control no-icon" required/>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Reason</label>
                <textarea name="reason" class="form-control" rows="4"
                          placeholder="State your reason for leave..."></textarea>
              </div>
              <button type="submit" class="btn btn-primary">Submit Request</button>
            </form>
          </div>
        </div>

        <!-- My Leave History -->
        <div>
          <div class="card staff-leave-history-card">
            <div class="card-header"><h5>My Leave History</h5></div>
            <div class="table-wrap">
              <table class="tbl">
                <thead><tr><th>From</th><th>To</th><th>Status</th><th>Admin Note</th></tr></thead>
                <tbody>
                  <tr th:if="${leaves.empty}">
                    <td colspan="4" style="text-align:center; padding:28px; color:var(--text-muted)">No leave requests yet</td>
                  </tr>
                  <tr th:each="lv : ${leaves}">
                    <td th:text="${lv.startDate}">Start</td>
                    <td th:text="${lv.endDate}">End</td>
                    <td>
                      <span class="badge"
                            th:classappend="${lv.status.name()=='PENDING'} ? 'badge-warning' :
                                            (${lv.status.name()=='APPROVED'} ? 'badge-success' : 'badge-danger')"
                            th:text="${lv.status}">PENDING</span>
                    </td>
                    <td class="text-sm" th:text="${lv.adminNote ?: '—'}">Note</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
<script th:src="@{/js/main.js}"></script>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
  document.addEventListener("DOMContentLoaded", function() {
    lucide.createIcons();
  });
</script>
</body>
</html>
