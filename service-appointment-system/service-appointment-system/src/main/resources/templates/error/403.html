<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Access Denied</title>
<link rel="stylesheet" th:href="@{/css/styles.css}"/></head>
<body>
<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; background: linear-gradient(135deg, #c8d8f0 0%, #e8eef8 100%);">
  <div style="text-align:center; padding:48px; background:#fff; border-radius:20px; box-shadow:0 8px 32px rgba(61,90,138,0.15); max-width:440px; width:90%;">
    <div style="font-size:72px; margin-bottom:16px"><i data-lucide="ban" class="icon-sm"></i></div>
    <h1 style="font-size:64px; font-weight:800; color:#dc3545; margin-bottom:8px">403</h1>
    <h2 style="font-size:20px; font-weight:700; color:#1e2a3a; margin-bottom:10px">Access Denied</h2>
    <p style="color:#6b7a90; margin-bottom:28px; line-height:1.6">You don't have permission to access this page. Please contact your administrator if you think this is a mistake.</p>
    <a th:href="@{/auth/login}" class="btn btn-primary" style="width:auto; padding:12px 32px;">← Back to Login</a>
  </div>
</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
  document.addEventListener("DOMContentLoaded", function() {
    lucide.createIcons();
  });
</script>
</body>
</html>
