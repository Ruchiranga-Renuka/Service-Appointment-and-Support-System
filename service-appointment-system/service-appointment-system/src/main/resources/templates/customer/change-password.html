<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Security Settings — Fixora</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}"/>
</head>
<body>
<div class="app-layout">
  <div th:replace="~{fragments/customer-sidebar :: customerSidebar('profile')}"></div>
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <h4><i data-lucide="shield-check" class="icon-sm"></i> Security Settings</h4>
        <p>Manage your account password and security preferences</p>
      </div>
    </div>
    
    <div class="page-body">
      <div class="customer-profile-page" style="max-width: 600px; margin: 0 auto;">
        
        <!-- Breadcrumb / Back button -->
        <a th:href="@{/customer/profile}" class="btn btn-sm btn-outline-secondary mb-24">
          <i data-lucide="arrow-left" class="icon-sm"></i> Back to Profile
        </a>

        <div th:if="${error}" class="alert alert-danger"><i data-lucide="alert-triangle" class="icon-sm"></i> <span th:text="${error}"></span></div>

        <div class="customer-panel" style="padding: 32px; border-radius: 20px;">
          <div class="form-section-title" style="font-size: 1.25rem; margin-bottom: 8px;">
            <i data-lucide="key" class="icon-md"></i> Update Password
          </div>
          <p class="text-muted text-sm mb-24">Ensure your account is using a long, random password to stay secure.</p>

          <form th:action="@{/customer/change-password}" method="post" th:object="${dto}" class="zen-form">
            <div class="form-group mb-16">
              <label class="form-label">Current Password</label>
              <div class="input-wrapper customer-input-wrap">
                <span class="input-icon"><i data-lucide="lock" class="icon-sm"></i></span>
                <input type="password" th:field="*{currentPassword}" id="oldPwd" class="form-control" placeholder="Enter current password" required/>
                <button type="button" class="input-icon-right customer-toggle-btn" data-target="oldPwd">Show</button>
              </div>
            </div>

            <div class="form-group mb-16">
              <label class="form-label">New Password</label>
              <div class="input-wrapper customer-input-wrap">
                <span class="input-icon"><i data-lucide="shield" class="icon-sm"></i></span>
                <input type="password" th:field="*{newPassword}" id="newPwd" class="form-control" placeholder="Create new password" required/>
                <button type="button" class="input-icon-right customer-toggle-btn" data-target="newPwd">Show</button>
              </div>
            </div>

            <div class="form-group mb-32">
              <label class="form-label">Confirm New Password</label>
              <div class="input-wrapper customer-input-wrap">
                <span class="input-icon"><i data-lucide="shield-check" class="icon-sm"></i></span>
                <input type="password" th:field="*{confirmNewPassword}" id="confirmPwd" class="form-control" placeholder="Repeat new password" required/>
                <button type="button" class="input-icon-right customer-toggle-btn" data-target="confirmPwd">Show</button>
              </div>
            </div>

            <button type="submit" class="btn btn-primary btn-full" style="height: 52px; font-weight: 700;">
              Update Password
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script th:src="@{/js/main.js}"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
  document.addEventListener("DOMContentLoaded", function() {
    lucide.createIcons();
    
    document.querySelectorAll('.customer-toggle-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var target = document.getElementById(btn.getAttribute('data-target'));
        var isPassword = target.type === 'password';
        target.type = isPassword ? 'text' : 'password';
        btn.textContent = isPassword ? 'Hide' : 'Show';
      });
    });
  });
</script>
</body>
</html>
