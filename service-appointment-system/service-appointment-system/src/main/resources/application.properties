server.port=8080

# H2 Database for development
spring.datasource.url=jdbc:mysql://localhost:3306/service_appointment_db
spring.datasource.driverClassName=
spring.datasource.username=root
spring.datasource.password=root@123


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# File upload configuration
app.upload.dir=uploads/id-photos

server.error.whitelabel.enabled=false

logging.level.com.example.sas=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

twilio.account.sid=${TWILIO_SID}
twilio.auth.token=${TWILIO_TOKEN}
twilio.from.number=${TWILIO_FROM_NUMBER}
